{% set name = "xeus-octave" %}
{% set version = "0.7.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/jupyter-xeus/xeus-octave/archive/v{{ version }}.tar.gz
  sha256: e741fde4ee7abe94f74dd2a210041d40cdb89b4bd4c94b36650b47230034fc8d

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - pkg-config
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake
    - make  # [unix]
  host:
    - octave >=10.0,<11.0
    - xorg-libxfixes  # [linux]
    - glfw
    - glad
    - libpng
    - xeus >=6,<7
    - xeus-zmq >=4.0,<5.0
    - nlohmann_json
    - nlohmann_json-abi

test:
  requires:
    - jupyter_kernel_test >=0.4.3
    - nbval
    - pytest
    - pytest-rerunfailures
  source_files:
    - test
  commands:
    - test -f ${PREFIX}/bin/xoctave  # [unix]
    - xoctave --version
    - pytest test -k 'not plot'
    - pytest test -k 'plot_plotly'

about:
  home: https://github.com/rapgenic/xeus-octave
  license: GPL-2.0-or-later
  license_file: LICENSE
  summary: Xeus kernel for Octave
  description: |
    Xeus kernel for the mathematics-oriented syntax with built-in
    2D/3D plotting and visualization tools Octave.

extra:
  recipe-maintainers:
    - JohanMabille
    - IsabelParedes
    - rapgenic
    - SylvainCorlay
    - AntoinePrv
